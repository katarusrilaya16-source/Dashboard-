<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            color:#2575fc;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2575fc;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1a5ed8;
        }

        a{
            color:#2575fc;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login Dashboard</h2>

    <form action="/login" method="POST">

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>

    </form>

    <br>

    <a href="/mail">Add New User</a>

</div>

</body>
</html>
