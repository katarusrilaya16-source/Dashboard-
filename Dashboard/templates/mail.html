<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#2575fc;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="box">

<h2>Add User</h2>


<form action="/add_user" method="POST">
    

    <label>Username:</label>
    <input type="text" name="username" placeholder="Enter username" required>
 
    <label>Email:</label>
    <input type="email" name="email" placeholder="Enter email" required>
    

    <label>Password:</label>
    <input type="password" name="password" placeholder="Enter password" required>
    
    <button type="submit">Add User</button>
</form>
</div>

</body>
</html>
